<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — AIStat</title>
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <main class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
      <div class="brand-mark" aria-hidden="true">AI</div>
      <h1 id="login-title">AIStat</h1>
      <p class="subtitle">Закрытая статистика использования Multica</p>

      {% if error %}
      <p class="error" role="alert">{{ error }}</p>
      {% endif %}

      <form method="post" action="/login" autocomplete="on">
        <input type="hidden" name="csrf" value="{{ csrf }}">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label>
          Имя пользователя
          <input
            type="text"
            name="username"
            maxlength="128"
            autocomplete="username"
            required
            autofocus
          >
        </label>
        <label>
          Пароль
          <input
            type="password"
            name="password"
            autocomplete="current-password"
            required
          >
        </label>
        <button type="submit">Войти</button>
      </form>

      {% if google_login_url %}
      <div class="oauth-divider">или</div>
      <a class="oauth-button" href="{{ google_login_url }}">
        <span class="g-mark" aria-hidden="true">G</span>
        Войти / зарегистрироваться через Google
      </a>
      {% endif %}

      <p class="security-note">
        Соединение защищено HTTPS. Пароль хранится только как стойкий хеш.
      </p>
    </section>
  </main>
</body>
</html>
